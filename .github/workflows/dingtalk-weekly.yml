name: 钉钉组会提醒（每周四）

on:
  schedule:
    # UTC 时间。周四 01:00 UTC = 周四 09:00 北京时间。改时间就改这里。
    - cron: '0 1 * * 4'
  workflow_dispatch:        # 手动触发按钮，用来测试

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 发送钉钉提醒
        env:
          DINGTALK_TOKEN: ${{ secrets.DINGTALK_TOKEN }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          PPT_LINK: ${{ vars.PPT_LINK }}      # 可在仓库 Settings → Variables 里设置（不想写进代码就用这个）
          PPT_TITLE: ${{ vars.PPT_TITLE }}
        run: node bot/dingtalk-notify.mjs
