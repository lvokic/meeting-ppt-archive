name: 钉钉组会提醒（每周四）

on:
  schedule:
    # UTC 时间。周四 01:00 UTC = 周四 09:00 北京时间。改时间就改这里。
    - cron: '0 1 * * 4'
  workflow_dispatch:        # 手动触发按钮，用来测试

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 安装 python-pptx
        run: pip install python-pptx

      - name: 用模板生成本周 PPT
        id: gen
        run: python3 bot/make_ppt.py

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 上传 Gitee + 更新网站 + 发钉钉群
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          DINGTALK_TOKEN: ${{ secrets.DINGTALK_TOKEN }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          PPT_PATH: ${{ steps.gen.outputs.ppt_path }}
          PPT_DATE: ${{ steps.gen.outputs.ppt_date }}
          PPT_TITLE: ${{ steps.gen.outputs.ppt_title }}
        run: node bot/publish.mjs
